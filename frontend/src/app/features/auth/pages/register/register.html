<div class="min-h-screen flex items-center justify-center bg-background p-4">
  <div class="w-full max-w-md">
    <!-- Logo Centralizada -->
    <div class="flex flex-col items-center mb-8">
      <div class="relative mb-4">
        <svg class="w-20 h-20 text-primary" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 17.5C16 18.88 14.88 20 13.5 20C12.12 20 11 18.88 11 17.5C11 16.12 12.12 15 13.5 15C14.88 15 16 16.12 16 17.5Z" fill="currentColor"/>
          <path d="M7 17.5C7 18.88 5.88 20 4.5 20C3.12 20 2 18.88 2 17.5C2 16.12 3.12 15 4.5 15C5.88 15 7 16.12 7 17.5Z" fill="currentColor"/>
          <path d="M17 6H14V12H20.46L17 6Z" fill="currentColor" opacity="0.7"/>
          <path d="M14 4H3C2.45 4 2 4.45 2 5V15H4C4 13.34 5.34 12 7 12H11C11 13.66 12.34 15 14 15H16V6L14 4Z" fill="currentColor" opacity="0.4"/>
          <rect x="20" y="12" width="2" height="3" fill="currentColor"/>
        </svg>
        <div class="absolute -bottom-2 -right-2 w-4 h-4 bg-primary rounded-full animate-pulse"></div>
      </div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-primary/70 bg-clip-text text-transparent mb-1">
        Frota Leve
      </h1>
      <p class="text-xs text-muted-foreground font-medium tracking-widest">
        GESTÃO INTELIGENTE DE FROTAS
      </p>
    </div>
    
    <div class="rounded-md border bg-card text-card-foreground shadow-sm">
      <div class="flex flex-col space-y-1.5 p-6 text-center">
        <h3 class="text-xl font-semibold">Criar Conta</h3>
        <p class="text-sm text-muted-foreground">Comece a gerenciar sua frota hoje mesmo</p>
      </div>
      
      <div class="p-6 pt-0">
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-2">Nome da Empresa</label>
              <input
                type="text"
                formControlName="tenantName"
                class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring"
                placeholder="Minha Empresa Ltda"
              />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2">CNPJ (opcional)</label>
              <input
                type="text"
                formControlName="tenantDocument"
                class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring"
                placeholder="00.000.000/0000-00"
              />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2">Seu Nome</label>
              <input
                type="text"
                formControlName="name"
                class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring"
                placeholder="João Silva"
              />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2">Email</label>
              <input
                type="email"
                formControlName="email"
                class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring"
                placeholder="seu@email.com"
              />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2">Senha</label>
              <input
                type="password"
                formControlName="password"
                class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring"
                placeholder="••••••••"
              />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2">Confirmar Senha</label>
              <input
                type="password"
                formControlName="confirmPassword"
                class="w-full px-3 py-2 border border-input rounded-md bg-background focus:outline-none focus:ring-2 focus:ring-ring"
                placeholder="••••••••"
              />
              <div *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched" class="text-sm text-destructive mt-1">
                As senhas não coincidem
              </div>
            </div>

            <div *ngIf="errorMessage" class="p-3 text-sm bg-destructive/10 text-destructive rounded-md">
              {{ errorMessage }}
            </div>

            <button
              type="submit"
              [disabled]="registerForm.invalid || loading"
              class="w-full inline-flex items-center justify-center rounded-md font-medium transition-colors bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2 disabled:opacity-50"
            >
              {{ loading ? 'Criando conta...' : 'Criar Conta' }}
            </button>
          </div>
        </form>
      </div>

      <div class="flex items-center p-6 pt-0 justify-center">
        <p class="text-sm text-muted-foreground">
          Já tem uma conta?
          <a routerLink="/auth/login" class="text-primary hover:underline ml-1">Faça login</a>
        </p>
      </div>
    </div>
  </div>
</div>
