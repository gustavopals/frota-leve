<div class="p-6 max-w-4xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">
      {{ isEditMode() ? 'Editar Template' : 'Novo Template' }}
    </h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-white rounded-lg shadow p-6">
    <!-- Informações Básicas -->
    <div class="mb-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">Informações Básicas</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Nome -->
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
            Nome do Template *
          </label>
          <input
            type="text"
            id="name"
            formControlName="name"
            placeholder="Ex: Checklist Diário"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="form.get('name')?.invalid && form.get('name')?.touched"
          />
          @if (form.get('name')?.invalid && form.get('name')?.touched) {
            <p class="mt-1 text-sm text-red-600">Nome é obrigatório</p>
          }
        </div>

        <!-- Tipo de Veículo -->
        <div>
          <label for="vehicleType" class="block text-sm font-medium text-gray-700 mb-2">
            Tipo de Veículo (opcional)
          </label>
          <input
            type="text"
            id="vehicleType"
            formControlName="vehicleType"
            placeholder="Ex: Van, Caminhonete"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>
      </div>

      <!-- Ativo -->
      <div class="mt-4">
        <label class="flex items-center">
          <input
            type="checkbox"
            formControlName="isActive"
            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-2 text-sm text-gray-700">Template ativo</span>
        </label>
      </div>
    </div>

    <!-- Itens do Checklist -->
    <div class="mb-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold text-gray-900">Itens do Checklist</h2>
        <button
          type="button"
          (click)="addItem()"
          class="px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm"
        >
          + Adicionar Item
        </button>
      </div>

      <div formArrayName="items" class="space-y-4">
        @for (item of items.controls; track $index; let i = $index) {
          <div [formGroupName]="i" class="border border-gray-200 rounded-lg p-4 bg-gray-50">
            <div class="flex justify-between items-start mb-4">
              <span class="text-sm font-medium text-gray-700">Item #{{ i + 1 }}</span>
              <div class="flex gap-2">
                <button
                  type="button"
                  (click)="moveItemUp(i)"
                  [disabled]="i === 0"
                  class="p-1 text-gray-600 hover:text-gray-900 disabled:opacity-30"
                  title="Mover para cima"
                >
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                  </svg>
                </button>
                <button
                  type="button"
                  (click)="moveItemDown(i)"
                  [disabled]="i === items.length - 1"
                  class="p-1 text-gray-600 hover:text-gray-900 disabled:opacity-30"
                  title="Mover para baixo"
                >
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                  </svg>
                </button>
                <button
                  type="button"
                  (click)="removeItem(i)"
                  [disabled]="items.length === 1"
                  class="p-1 text-red-600 hover:text-red-900 disabled:opacity-30"
                  title="Remover"
                >
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                  </svg>
                </button>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <!-- Label -->
              <div>
                <label [for]="'label-' + i" class="block text-sm font-medium text-gray-700 mb-2">
                  Rótulo *
                </label>
                <input
                  type="text"
                  [id]="'label-' + i"
                  formControlName="label"
                  placeholder="Ex: Pneus calibrados?"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  [class.border-red-500]="item.get('label')?.invalid && item.get('label')?.touched"
                />
              </div>

              <!-- Tipo -->
              <div>
                <label [for]="'type-' + i" class="block text-sm font-medium text-gray-700 mb-2">
                  Tipo *
                </label>
                <select
                  [id]="'type-' + i"
                  formControlName="type"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                >
                  @for (type of fieldTypes; track type.value) {
                    <option [value]="type.value">{{ type.label }}</option>
                  }
                </select>
              </div>
            </div>
          </div>
        }
      </div>
    </div>

    <!-- Botões -->
    <div class="flex justify-end gap-3">
      <button
        type="button"
        (click)="cancel()"
        class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors"
        [disabled]="loading()"
      >
        Cancelar
      </button>
      <button
        type="submit"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="loading() || form.invalid"
      >
        {{ loading() ? 'Salvando...' : (isEditMode() ? 'Atualizar' : 'Criar Template') }}
      </button>
    </div>
  </form>
</div>
