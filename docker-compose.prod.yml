services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: frota-leve-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frota_leve}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-frota_leve}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: frota-leve-redis-prod
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-docker.io/seu-usuario/frota-leve-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: frota-leve-api-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-frota_leve}?schema=public
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/api/v1/health'').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: ${WEB_IMAGE:-docker.io/seu-usuario/frota-leve-web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: frota-leve-web-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-80}:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/healthz || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_prod_data:
  redis_prod_data:
