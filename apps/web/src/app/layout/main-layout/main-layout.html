<po-toolbar [p-title]="appName"></po-toolbar>

<section class="main-layout">
  <header class="main-layout__banner">
    <div>
      <span class="main-layout__eyebrow">Operacao conectada</span>
      <h1>{{ appName }}</h1>
      <p>Base de navegacao, autenticacao e integracao pronta para evoluir os modulos da plataforma.</p>
    </div>

    <div class="main-layout__meta">
      <span class="main-layout__pill">Angular 21</span>
      <span class="main-layout__pill">PO-UI 21</span>
      <span class="main-layout__pill">v{{ appVersion }}</span>
    </div>
  </header>

  <div class="main-layout__shell">
    <aside class="main-layout__menu">
      <po-menu [p-menus]="menus"></po-menu>
    </aside>

    <main class="main-layout__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</section>
