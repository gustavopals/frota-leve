<section class="forgot-password-page">
  <span class="forgot-password-page__eyebrow">Recuperacao</span>
  <h2>Esqueci minha senha</h2>
  <p>Informe o e-mail da conta. Se ele existir, enviaremos as instrucoes de redefinicao.</p>

  <form
    class="forgot-password-page__form"
    [formGroup]="form"
    novalidate
  >
    <div class="forgot-password-page__field">
      <po-input
        formControlName="email"
        name="email"
        p-label="E-mail"
      ></po-input>
      @for (error of emailErrors; track error) {
        <small class="forgot-password-page__error">{{ error }}</small>
      }
    </div>
  </form>

  <div class="forgot-password-page__actions">
    <po-button
      p-kind="primary"
      p-label="Enviar instrucoes"
      [p-disabled]="form.invalid || isSubmitting"
      [p-loading]="isSubmitting"
      (p-click)="submit()"
    ></po-button>
  </div>

  @if (successMessage) {
    <div class="forgot-password-page__success">
      {{ successMessage }}
    </div>
  }

  <nav class="forgot-password-page__links">
    <a routerLink="/auth/login">Voltar para o login</a>
  </nav>
</section>
